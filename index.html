<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VoxLeads AI</title>
    <script>
      // Defensive fix for "Cannot set property fetch of #<Window> which has only a getter"
      // This error occurs when libraries like protobufjs or formdata-polyfill try to 
      // overwrite the global fetch function in environments where it is read-only.
      (function() {
        try {
          const descriptor = Object.getOwnPropertyDescriptor(window, 'fetch') || 
                            Object.getOwnPropertyDescriptor(Window.prototype, 'fetch');
          
          if (descriptor && !descriptor.writable && !descriptor.set) {
            const originalFetch = window.fetch;
            Object.defineProperty(window, 'fetch', {
              configurable: true,
              enumerable: true,
              get: function() { return originalFetch; },
              set: function() { 
                console.warn('Prevented an attempt to overwrite window.fetch');
              }
            });
          }
        } catch (e) {
          // Ignore errors during patching
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
